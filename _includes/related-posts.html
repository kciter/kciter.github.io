<div class="related">
  <div class="related-posts">
    {% assign posts = site.posts | sample: 6 %}
    {% for post in posts %}
      <div class="related-post">
        <a href="{{ site.github.url }}{{ post.url }}">
          <img src="{{ post.image }}">
          <div class="title">{{ post.title }}</div>
          <small>{{ post.date | date: "%Y-%m-%d" }}</small>
        </a>
      </div>
    {% endfor %}
  </div>
</div>
